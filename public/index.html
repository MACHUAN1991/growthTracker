<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马莅格的成长记录</title>
    <style>
        :root {
            --bg: #f4f8f6;
            --bg-card: #ffffff;
            --bg-elevated: #eaf2ee;
            --accent: #4da682;
            --accent-dark: #3a8a6a;
            --accent-light: #a3d9c0;
            --accent-dim: rgba(77, 166, 130, 0.08);
            --text: #1e2e28;
            --text-secondary: #5a7a6e;
            --text-dim: #8fa8a0;
            --border: #d6e5de;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
            --shadow-accent: 0 4px 20px rgba(77, 166, 130, 0.25);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.3s var(--ease);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'SF Pro Display', 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        a { color: inherit; text-decoration: none; }

        /* ======== Hero Section ======== */
        .hero {
            position: relative;
            padding: 80px 32px 60px;
            text-align: center;
            overflow: hidden;
            background: linear-gradient(160deg, #e8f5ef 0%, #d4ede3 30%, #c8e6d8 60%, #e0f0e8 100%);
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -120px;
            right: -80px;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(77,166,130,0.12) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -60px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(163,217,192,0.2) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
        }
        .hero h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.3;
            background: linear-gradient(135deg, #2d7a5a, #4da682, #3a8a6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        .hero .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 400;
        }
        .hero-actions {
            margin-top: 28px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .hero-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 11px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }
        .hero-btn-primary {
            background: linear-gradient(135deg, #4da682, #3a8a6a);
            color: #fff;
            box-shadow: var(--shadow-accent);
        }
        .hero-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(77, 166, 130, 0.35);
        }
        .hero-btn-secondary {
            background: rgba(255,255,255,0.7);
            color: var(--text-secondary);
            border: 1px solid rgba(77, 166, 130, 0.2);
            backdrop-filter: blur(8px);
        }
        .hero-btn-secondary:hover {
            background: rgba(255,255,255,0.9);
            border-color: var(--accent);
            color: var(--accent-dark);
        }

        /* ======== Stats Cards ======== */
        .stats-row {
            max-width: 700px;
            margin: -30px auto 0;
            padding: 0 32px;
            display: flex;
            gap: 16px;
            position: relative;
            z-index: 2;
        }
        .stat-card {
            flex: 1;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 16px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(214, 229, 222, 0.5);
        }
        .stat-card .stat-num {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3a8a6a, #4da682);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .stat-card .stat-label {
            font-size: 0.78rem;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 0.05em;
        }

        /* ======== Sticky Filter Bar ======== */
        .filter-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(244, 248, 246, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(214, 229, 222, 0.5);
            padding: 14px 32px;
            transition: var(--transition);
        }
        .filter-bar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .filter-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-elevated);
            border-radius: 12px;
            padding: 3px;
        }
        .filter-tab {
            padding: 7px 18px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            transition: var(--transition);
        }
        .filter-tab:hover { color: var(--text-secondary); }
        .filter-tab.active {
            background: var(--bg-card);
            color: var(--accent-dark);
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .year-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .year-pill {
            padding: 6px 14px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            transition: var(--transition);
        }
        .year-pill:hover { border-color: var(--accent); color: var(--accent-dark); }
        .year-pill.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent-dark);
            font-weight: 500;
        }
        .filter-spacer { flex: 1; }
        .filter-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 16px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-dim);
        }
        .filter-action-btn:hover { border-color: var(--accent); color: var(--accent-dark); }
        .filter-action-btn.primary {
            background: linear-gradient(135deg, #4da682, #3a8a6a);
            color: #fff;
            border: none;
            box-shadow: var(--shadow-accent);
        }
        .filter-action-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(77,166,130,0.3); }
        .filter-action-btn.danger {
            background: #e87c7c;
            color: #fff;
            border: none;
            display: none;
        }
        .filter-action-btn.danger.show { display: inline-flex; }
        .filter-action-btn.active-mode {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ======== Main Content ======== */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 32px 80px;
        }

        /* ======== Timeline ======== */
        .timeline-section {
            margin-bottom: 56px;
            position: relative;
        }
        .timeline-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-left: 28px;
            position: relative;
        }
        .timeline-header::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 3px rgba(77,166,130,0.2);
        }
        .timeline-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
            white-space: nowrap;
        }
        .timeline-header .tl-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }
        .timeline-header .tl-count {
            font-size: 0.78rem;
            color: var(--text-dim);
            background: var(--bg-elevated);
            padding: 3px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* Timeline vertical line */
        .timeline-section::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 36px;
            bottom: -56px;
            width: 2px;
            background: linear-gradient(180deg, var(--accent-light), var(--border));
        }
        .timeline-section:last-child::before { display: none; }

        /* ======== Media Grid ======== */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            padding-left: 28px;
        }

        /* ======== Media Card ======== */
        .media-card {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-card);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(214, 229, 222, 0.4);
            aspect-ratio: 3/4;
        }
        .media-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-light);
        }
        .media-card .thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s var(--ease);
        }
        .media-card:hover .thumb {
            transform: scale(1.05);
        }
        /* Hover overlay */
        .media-card .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.55) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s var(--ease);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
        }
        .media-card:hover .card-overlay { opacity: 1; }
        .card-overlay .card-date {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.75);
            margin-bottom: 4px;
        }
        .card-overlay .card-desc {
            font-size: 0.82rem;
            color: #fff;
            font-weight: 500;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Select mode */
        .media-card.select-mode { cursor: default; }
        .media-card .check-overlay {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            width: 26px;
            height: 26px;
            background: rgba(255,255,255,0.9);
            border: 2px solid var(--accent);
            border-radius: 50%;
            z-index: 5;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transition: var(--transition);
        }
        .select-mode .media-card .check-overlay { display: flex; }
        .media-card.selected .check-overlay {
            background: var(--accent);
            border-color: var(--accent);
        }
        .media-card.selected .check-overlay::after {
            content: '✓';
            color: #fff;
            font-size: 13px;
            font-weight: bold;
        }
        .media-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(77,166,130,0.3);
        }

        /* ======== Video Card ======== */
        .video-card .video-thumb {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4da682 0%, #2d7a5a 100%);
        }
        .play-icon {
            width: 52px;
            height: 52px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: var(--transition);
        }
        .play-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 56%;
            transform: translate(-50%, -50%);
            border-style: solid;
            border-width: 9px 0 9px 15px;
            border-color: transparent transparent transparent #2d7a5a;
        }
        .media-card:hover .play-icon {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(0,0,0,0.2);
        }

        /* ======== Empty State ======== */
        .empty {
            text-align: center;
            padding: 120px 40px;
            color: var(--text-dim);
        }
        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: var(--bg-elevated);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .empty h3 {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }
        .empty p { font-size: 0.88rem; opacity: 0.7; }

        /* ======== Lightbox ======== */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(14, 22, 18, 0.96);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .lightbox.active { display: flex; }
        .lightbox .lb-media {
            max-width: 90vw;
            max-height: 72vh;
            border-radius: var(--radius);
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            object-fit: contain;
        }
        .lightbox .lb-info {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 32, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(163, 217, 192, 0.1);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }
        .lightbox .lb-date {
            font-size: 0.82rem;
            color: rgba(163, 217, 192, 0.6);
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .lightbox .lb-desc {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(163, 217, 192, 0.15);
            color: #fff;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: inherit;
            flex: 1;
            max-width: 300px;
            transition: var(--transition);
        }
        .lightbox .lb-desc::placeholder { color: rgba(255,255,255,0.3); }
        .lightbox .lb-desc:focus {
            outline: none;
            border-color: var(--accent-light);
            background: rgba(255,255,255,0.1);
        }
        .lightbox .lb-gps a {
            color: var(--accent-light);
            font-size: 0.82rem;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .lightbox .lb-gps a:hover { opacity: 1; }
        .lb-delete-btn {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid rgba(232, 124, 124, 0.4);
            color: #e88;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            transition: var(--transition);
            white-space: nowrap;
        }
        .lb-delete-btn:hover {
            background: #e87c7c;
            border-color: #e87c7c;
            color: #fff;
        }

        .lightbox .lb-close {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 42px;
            height: 42px;
            border: 1px solid rgba(163,217,192,0.2);
            background: rgba(20,32,26,0.6);
            color: #fff;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 20;
            backdrop-filter: blur(8px);
        }
        .lightbox .lb-close:hover { background: rgba(77,166,130,0.3); border-color: var(--accent-light); }
        .lightbox .lb-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border: 1px solid rgba(163,217,192,0.2);
            background: rgba(20,32,26,0.5);
            color: #fff;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 20;
            backdrop-filter: blur(8px);
        }
        .lightbox .lb-nav:hover { background: rgba(77,166,130,0.3); border-color: var(--accent-light); }
        .lightbox .lb-nav.prev { left: 20px; }
        .lightbox .lb-nav.next { right: 20px; }

        /* ======== Delete Modal ======== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(14, 22, 18, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            width: 340px;
            text-align: center;
            box-shadow: 0 32px 80px rgba(0,0,0,0.3);
        }
        .modal-box h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text);
        }
        .modal-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: inherit;
            background: var(--bg-elevated);
            color: var(--text);
            text-align: center;
            transition: var(--transition);
        }
        .modal-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(77,166,130,0.1);
        }
        .modal-error {
            color: #e87c7c;
            font-size: 0.8rem;
            margin-top: 10px;
            min-height: 1.2em;
        }
        .modal-btns {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .modal-btn {
            flex: 1;
            padding: 11px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            font-family: inherit;
            transition: var(--transition);
            border: none;
        }
        .modal-btn.cancel {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .modal-btn.cancel:hover { border-color: var(--text-dim); }
        .modal-btn.confirm {
            background: linear-gradient(135deg, #e87c7c, #d96b6b);
            color: #fff;
        }
        .modal-btn.confirm:hover { box-shadow: 0 4px 16px rgba(232,124,124,0.3); }

        /* ======== Upload Modal ======== */
        .upload-modal .modal-box {
            width: 90%;
            max-width: 480px;
            text-align: left;
        }
        .upload-modal .modal-box h3 {
            text-align: center;
        }
        .upload-modal .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .upload-modal .modal-close:hover { border-color: var(--text-dim); color: var(--text); }
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 56px 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-elevated);
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .drop-zone .dz-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: rgba(77,166,130,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .drop-zone .dz-text { font-size: 0.9rem; color: var(--text-secondary); }
        .drop-zone .dz-text strong { color: var(--accent-dark); }
        .drop-zone .dz-hint { font-size: 0.78rem; color: var(--text-dim); margin-top: 10px; }
        .upload-file-input { display: none; }
        .upload-progress { display: none; margin-top: 20px; }
        .upload-progress.active { display: block; }
        .progress-bar-wrap {
            background: var(--bg-elevated);
            border-radius: 6px;
            height: 6px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4da682, #a3d9c0);
            width: 0%;
            transition: width 0.3s;
            border-radius: 6px;
        }
        .progress-text { font-size: 0.8rem; color: var(--text-dim); }
        .upload-result {
            display: none;
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
        }
        .upload-result.success { display: block; background: rgba(77,166,130,0.08); border: 1px solid rgba(77,166,130,0.2); color: var(--accent-dark); }
        .upload-result.error { display: block; background: rgba(232,124,124,0.08); border: 1px solid rgba(232,124,124,0.2); color: #e87c7c; }
        .confirm-upload-btn {
            display: none;
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: linear-gradient(135deg, #4da682, #3a8a6a);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-accent);
        }
        .confirm-upload-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(77,166,130,0.3); }

        /* ======== Share Toast ======== */
        .share-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            border: 1px solid var(--accent-light);
            border-radius: 14px;
            padding: 14px 28px;
            font-size: 0.88rem;
            color: var(--text);
            box-shadow: var(--shadow-lg);
            z-index: 5000;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            backdrop-filter: blur(12px);
        }
        .share-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }

        /* ======== Back to Top ======== */
        .back-top {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.9);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--accent);
            display: none;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 100;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }
        .back-top.visible { display: flex; }
        .back-top:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-accent);
        }

        /* ======== Lazy load animation ======== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .media-card { animation: fadeInUp 0.4s var(--ease) both; }
        .media-card:nth-child(1) { animation-delay: 0s; }
        .media-card:nth-child(2) { animation-delay: 0.03s; }
        .media-card:nth-child(3) { animation-delay: 0.06s; }
        .media-card:nth-child(4) { animation-delay: 0.09s; }
        .media-card:nth-child(5) { animation-delay: 0.12s; }
        .media-card:nth-child(6) { animation-delay: 0.15s; }

        /* ======== Responsive ======== */
        @media (max-width: 768px) {
            .hero { padding: 60px 20px 50px; }
            .hero h1 { font-size: 1.8rem; }
            .stats-row { padding: 0 16px; gap: 10px; margin-top: -24px; }
            .stat-card { padding: 16px 12px; }
            .stat-card .stat-num { font-size: 1.4rem; }
            .filter-bar { padding: 12px 16px; }
            .filter-bar-inner { gap: 10px; }
            .main { padding: 32px 16px 60px; }
            .media-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
                padding-left: 20px;
            }
            .timeline-header { padding-left: 20px; }
            .timeline-section::before { left: 8px; }
            .lightbox .lb-info {
                flex-wrap: wrap;
                padding: 16px 20px;
                gap: 10px;
            }
            .lightbox .lb-desc { max-width: 100%; }
            .lightbox .lb-nav { width: 40px; height: 40px; font-size: 1rem; }
            .lightbox .lb-nav.prev { left: 10px; }
            .lightbox .lb-nav.next { right: 10px; }
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 1.5rem; }
            .hero .subtitle { font-size: 0.82rem; }
            .hero-actions { flex-direction: column; align-items: center; }
            .stats-row { flex-direction: column; gap: 8px; }
            .filter-bar-inner { flex-direction: column; align-items: stretch; }
            .filter-tabs { justify-content: center; }
            .year-pills { justify-content: center; }
            .filter-spacer { display: none; }
            .filter-action-btn { justify-content: center; }
            .media-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
                padding-left: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>马莅格的成长记录</h1>
            <div class="subtitle">Memory Archive</div>
            <div class="hero-actions">
                <button class="hero-btn hero-btn-primary" onclick="openUpload()">+ 上传照片</button>
                <button class="hero-btn hero-btn-secondary" onclick="location.href='/joke'">随机笑话</button>
            </div>
        </div>
    </section>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-label">全部记录</div></div>
        <div class="stat-card"><div class="stat-num" id="statYears">—</div><div class="stat-label">成长年份</div></div>
        <div class="stat-card"><div class="stat-num" id="statMonths">—</div><div class="stat-label">跨越月份</div></div>
    </div>

    <!-- Sticky Filter Bar -->
    <div class="filter-bar">
        <div class="filter-bar-inner">
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="setType('all', this)">全部</button>
                <button class="filter-tab" onclick="setType('photo', this)">照片</button>
                <button class="filter-tab" onclick="setType('video', this)">视频</button>
            </div>
            <div class="year-pills" id="yearList"></div>
            <div class="filter-spacer"></div>
            <button class="filter-action-btn" id="selectBtn" onclick="toggleSelectMode()">选择</button>
            <button class="filter-action-btn danger" id="deleteSelectedBtn" onclick="startBatchDelete()">删除已选</button>
            <button class="filter-action-btn" id="shareBtn" onclick="sharePage()">分享</button>
        </div>
    </div>

    <!-- Share Toast -->
    <div class="share-toast" id="shareToast"></div>

    <!-- Main Content -->
    <main class="main">
        <div class="timeline" id="timeline"></div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lb-close" onclick="closeLb()">×</button>
        <button class="lb-nav prev" onclick="navigate(-1)">‹</button>
        <div id="lbMedia"></div>
        <div class="lb-info">
            <div class="lb-date" id="lbDate"></div>
            <input class="lb-desc" id="lbDesc" placeholder="添加描述..." onblur="saveDesc()">
            <div class="lb-gps" id="lbGps"></div>
            <button class="lb-delete-btn" id="lbDeleteBtn" onclick="startDelete()">删除</button>
        </div>
        <button class="lb-nav next" onclick="navigate(1)">›</button>
    </div>

    <!-- Delete Password Modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <h3 id="deleteModalTitle">请输入密码</h3>
            <input type="password" class="modal-input" id="deletePasswordInput" placeholder="密码">
            <div class="modal-error" id="deleteError"></div>
            <div class="modal-btns">
                <button class="modal-btn cancel" onclick="closeDeleteModal()">取消</button>
                <button class="modal-btn confirm" onclick="submitDelete()">确认</button>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal-overlay upload-modal" id="uploadModal">
        <div class="modal-box" style="position:relative;">
            <button class="modal-close" onclick="closeUpload()">×</button>
            <h3>上传文件</h3>
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="dz-icon">↑</div>
                <div class="dz-text">拖拽文件到这里，或 <strong>点击选择</strong></div>
                <div class="dz-hint">JPG · PNG · GIF · WEBP · MP4 · MOV</div>
            </div>
            <input type="file" class="upload-file-input" id="fileInput" multiple accept="image/*,video/*">
            <button class="confirm-upload-btn" id="confirmUploadBtn" onclick="confirmUpload()">确认上传</button>
            <div class="upload-progress" id="uploadProgress">
                <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
                <div class="progress-text" id="progressText">上传中...</div>
            </div>
            <div id="uploadResult"></div>
        </div>
    </div>

    <!-- Back to Top -->
    <button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <script>
        const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
        let allMedia = [], displayedMedia = [];
        let curYear = null, curType = 'all', curIndex = 0;

        async function loadTimeline() {
            try {
                const r = await fetch('/api/timeline');
                const d = await r.json();
                renderStats(d.timeline);
                renderYears(d.timeline);
            } catch(e) { console.error(e); }
        }

        function renderStats(tl) {
            const total = tl.reduce((s,i) => s + i.count, 0);
            const years = [...new Set(tl.map(i => i.year))].length;
            document.getElementById('statTotal').textContent = total || '—';
            document.getElementById('statYears').textContent = years || '—';
            document.getElementById('statMonths').textContent = tl.length || '—';
        }

        function renderYears(tl) {
            const years = [...new Set(tl.map(i => i.year))].sort((a,b) => b - a);
            document.getElementById('yearList').innerHTML = years.map(y => {
                const c = tl.filter(i => i.year == y).reduce((s,i) => s + i.count, 0);
                return `<button class="year-pill${curYear == y ? ' active' : ''}" onclick="setYear(${y})">${y} <span style="opacity:.5;font-size:.72rem">(${c})</span></button>`;
            }).join('');
        }

        async function loadMedia() {
            let url = '/api/photos?limit=2000';
            if (curYear) url += `&year=${curYear}`;
            if (curType !== 'all') url += `&type=${curType}`;
            try {
                const r = await fetch(url);
                const d = await r.json();
                allMedia = d.photos;
                displayedMedia = [...allMedia];
                renderTimeline();
            } catch(e) { console.error(e); }
        }

        function renderTimeline() {
            const el = document.getElementById('timeline');
            if (displayedMedia.length === 0) {
                el.innerHTML = `<div class="empty"><div class="empty-icon"> </div><h3>暂无内容</h3><p>点击上方「上传照片」添加照片或视频</p></div>`;
                return;
            }
            const groups = {};
            displayedMedia.forEach(m => {
                const d = new Date(m.taken_at);
                const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(m);
            });
            let html = '';
            Object.keys(groups).sort().reverse().forEach(key => {
                const [y, m] = key.split('-');
                const list = groups[key];
                html += `<div class="timeline-section">
                    <div class="timeline-header">
                        <h3>${y}年 ${MONTHS[parseInt(m)-1]}</h3>
                        <div class="tl-line"></div>
                        <span class="tl-count">${list.length} 项</span>
                    </div>
                    <div class="media-grid${selectMode ? ' select-mode' : ''}">${list.map((media, i) => {
                        const gIdx = displayedMedia.indexOf(media);
                        const isVid = media.file_type === 'video';
                        const src = `/thumbnails/${media.filename}`;
                        const isSelected = selectedIds.has(media.id);
                        const cardClass = `media-card${isSelected ? ' selected' : ''}${isVid ? ' video-card' : ''}`;
                        const dateStr = fmtDate(media.taken_at);
                        const desc = media.description || '';
                        if (isVid) {
                            return `<div class="${cardClass}" onclick="toggleSelect(${media.id}, ${gIdx})">
                                <div class="check-overlay"></div>
                                <div class="video-thumb">
                                    <div class="play-icon"></div>
                                </div>
                                <div class="card-overlay">
                                    <div class="card-date">${dateStr}</div>
                                    ${desc ? `<div class="card-desc">${desc}</div>` : ''}
                                </div>
                            </div>`;
                        }
                        return `<div class="${cardClass}" onclick="toggleSelect(${media.id}, ${gIdx})">
                            <div class="check-overlay"></div>
                            <img class="thumb" src="${src}" loading="lazy">
                            <div class="card-overlay">
                                <div class="card-date">${dateStr}</div>
                                ${desc ? `<div class="card-desc">${desc}</div>` : ''}
                            </div>
                        </div>`;
                    }).join('')}</div></div>`;
            });
            el.innerHTML = html;
            updateSelectUI();
        }

        function fmtDate(s) {
            const d = new Date(s);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function setType(t, btn) {
            curType = t;
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadMedia();
        }

        function setYear(y) {
            curYear = curYear === y ? null : y;
            loadTimeline();
            loadMedia();
        }

        // Lightbox
        function openLb(idx) {
            curIndex = idx;
            const m = displayedMedia[idx];
            const isVid = m.file_type === 'video';
            document.getElementById('lbMedia').innerHTML = isVid
                ? `<video class="lb-media" src="/videos/${m.filename}" controls autoplay></video>`
                : `<img class="lb-media" src="/photos/${m.filename}" alt="">`;
            document.getElementById('lbDate').textContent = fmtDate(m.taken_at);
            document.getElementById('lbDesc').value = m.description || '';
            document.getElementById('lightbox').dataset.id = m.id;
            const gpsEl = document.getElementById('lbGps');
            if (m.latitude && m.longitude) {
                gpsEl.innerHTML = `<a href="https://www.openstreetmap.org/?mlat=${m.latitude}&mlon=${m.longitude}&zoom=15" target="_blank" rel="noopener">📍 在地图中查看</a>`;
            } else {
                gpsEl.innerHTML = '';
            }
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLb() {
            const v = document.querySelector('#lbMedia video');
            if (v) v.pause();
            document.getElementById('lightbox').classList.remove('active');
        }

        function navigate(dir) {
            curIndex = (curIndex + dir + displayedMedia.length) % displayedMedia.length;
            openLb(curIndex);
        }

        // Multi-select mode
        let selectMode = false;
        let selectedIds = new Set();

        function toggleSelectMode() {
            selectMode = !selectMode;
            if (selectMode) {
                selectedIds.clear();
            }
            renderTimeline();
        }

        function toggleSelect(id, idx) {
            if (!selectMode) {
                openLb(idx);
                return;
            }
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            renderTimeline();
        }

        function updateSelectUI() {
            const selectBtn = document.getElementById('selectBtn');
            const deleteBtn = document.getElementById('deleteSelectedBtn');
            selectBtn.classList.toggle('active-mode', selectMode);
            selectBtn.textContent = selectMode ? '取消' : '选择';
            deleteBtn.classList.toggle('show', selectedIds.size > 0);
            if (selectedIds.size > 0) {
                deleteBtn.textContent = `删除已选 (${selectedIds.size})`;
            }
        }

        let deleteConfirmCount = 0;

        function startBatchDelete() {
            if (selectedIds.size === 0) return;
            deleteConfirmCount = 0;
            document.getElementById('deleteModalTitle').textContent = `确认删除 ${selectedIds.size} 个文件？`;
            document.getElementById('deletePasswordInput').value = '';
            document.getElementById('deletePasswordInput').placeholder = '密码';
            document.getElementById('deleteError').textContent = '';
            document.getElementById('deleteModal').classList.add('active');
            document.getElementById('deletePasswordInput').focus();
        }

        const DELETE_PASSWORD = '231109';

        function startDelete() {
            deleteConfirmCount = 0;
            document.getElementById('deleteModalTitle').textContent = '请输入密码';
            document.getElementById('deletePasswordInput').value = '';
            document.getElementById('deleteError').textContent = '';
            document.getElementById('deleteModal').classList.add('active');
            document.getElementById('deletePasswordInput').focus();
        }

        function sharePage() {
            const shareData = {
                title: '马莅格的成长记录',
                text: '来看看马莅格的成长记录',
                url: window.location.origin
            };
            if (navigator.share) {
                navigator.share(shareData).then(() => {
                    showToast('分享成功！');
                }).catch(() => {});
            } else {
                showToast('请复制浏览器地址栏链接分享给好友');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('shareToast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
        }

        function submitDelete() {
            const input = document.getElementById('deletePasswordInput');
            const error = document.getElementById('deleteError');
            const title = document.getElementById('deleteModalTitle');

            if (deleteConfirmCount === 0) {
                if (input.value !== DELETE_PASSWORD) {
                    error.textContent = '密码错误';
                    input.value = '';
                    return;
                }
                deleteConfirmCount = 1;
                title.textContent = '确认删除？输入 "delete"';
                input.value = '';
                input.placeholder = '输入 delete';
                error.textContent = '';
                return;
            }

            if (deleteConfirmCount === 1) {
                if (input.value.toLowerCase() !== 'delete') {
                    error.textContent = '输入不正确';
                    return;
                }
                doDelete();
                return;
            }
        }

        async function doDelete() {
            const id = document.getElementById('lightbox').dataset.id;
            const isBatch = selectedIds.size > 0;
            const idsToDelete = isBatch ? [...selectedIds] : [parseInt(id)];

            closeDeleteModal();
            if (!isBatch) closeLb();

            for (const delId of idsToDelete) {
                try {
                    await fetch(`/api/photos/${delId}`, { method: 'DELETE' });
                } catch(e) {
                    console.error(e);
                }
            }

            selectedIds.clear();
            selectMode = false;
            loadTimeline();
            loadMedia();
        }

        document.getElementById('deletePasswordInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitDelete();
        });

        async function saveDesc() {
            const id = document.getElementById('lightbox').dataset.id;
            const desc = document.getElementById('lbDesc').value;
            try {
                await fetch(`/api/photos/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({description: desc})
                });
                loadMedia();
            } catch(e) { console.error(e); }
        }

        document.addEventListener('keydown', e => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLb();
            if (e.key === 'ArrowLeft') navigate(-1);
            if (e.key === 'ArrowRight') navigate(1);
        });

        // Upload
        function openUpload() {
            document.getElementById('uploadModal').classList.add('active');
            document.getElementById('uploadProgress').classList.remove('active');
            document.getElementById('uploadResult').className = '';
            document.getElementById('uploadResult').textContent = '';
            document.getElementById('fileInput').value = '';
            pendingFiles = null;
            document.getElementById('confirmUploadBtn').style.display = 'none';
        }

        function closeUpload() {
            document.getElementById('uploadModal').classList.remove('active');
            document.getElementById('fileInput').value = '';
            pendingFiles = null;
        }

        const dz = document.getElementById('dropZone');
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
        dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if(e.dataTransfer.files.length) handleFileSelect(e.dataTransfer.files); });
        document.getElementById('fileInput').addEventListener('change', function() { if(this.files.length) handleFileSelect(this.files); });
        document.getElementById('uploadModal').addEventListener('click', e => { if(e.target.id === 'uploadModal') closeUpload(); });

        function handleFileSelect(files) {
            pendingFiles = files;
            document.getElementById('confirmUploadBtn').style.display = 'block';
            document.getElementById('confirmUploadBtn').textContent = `确认上传 ${files.length} 个文件`;
        }

        function confirmUpload() {
            if (!pendingFiles) return;
            const files = pendingFiles;
            const fd = new FormData();
            for (const f of files) fd.append('files', f);

            const pb = document.getElementById('progressBar');
            const pt = document.getElementById('progressText');
            const up = document.getElementById('uploadProgress');
            const ur = document.getElementById('uploadResult');
            up.classList.add('active'); ur.className = ''; ur.textContent = '';
            pb.style.width = '0%';
            pt.textContent = `正在上传 ${files.length} 个文件...`;
            document.getElementById('confirmUploadBtn').style.display = 'none';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload');
            xhr.upload.addEventListener('progress', e => {
                if (e.lengthComputable) { const pct = Math.round((e.loaded/e.total)*100); pb.style.width = pct+'%'; pt.textContent = `上传中... ${pct}%`; }
            });
            xhr.addEventListener('load', () => {
                pb.style.width = '100%';
                if (xhr.status === 200) {
                    const d = JSON.parse(xhr.responseText);
                    pt.textContent = '完成';
                    let msg = '';
                    if (d.total > 0) msg += `✓ 成功 ${d.total} 个`;
                    if (d.errors && d.errors.length) msg += (msg?'\n':'') + `⚠ ${d.errors.length} 个跳过`;
                    ur.textContent = msg;
                    ur.className = d.total > 0 ? 'success' : 'error';
                    setTimeout(() => { closeUpload(); loadTimeline(); loadMedia(); }, 1600);
                } else {
                    pt.textContent = '失败'; ur.className = 'error'; ur.textContent = '上传失败，请重试';
                    document.getElementById('confirmUploadBtn').style.display = 'block';
                }
            });
            xhr.addEventListener('error', () => { pt.textContent = '网络错误'; ur.className = 'error'; ur.textContent = '网络连接失败'; document.getElementById('confirmUploadBtn').style.display = 'block'; });
            xhr.send(fd);
            pendingFiles = null;
        }

        function upload(files) { handleFileSelect(files); }

        // Back to top
        window.addEventListener('scroll', () => {
            document.getElementById('backTop').classList.toggle('visible', window.scrollY > 400);
        });

        loadTimeline();
        loadMedia();
    </script>
</body>
</html>
