<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笑话 - 成长记录</title>
    <style>
        :root {
            --bg: #f4f8f6;
            --bg-card: #ffffff;
            --accent: #4da682;
            --accent-dark: #3a8a6a;
            --accent-light: #a3d9c0;
            --text: #1e2e28;
            --text-secondary: #5a7a6e;
            --text-dim: #8fa8a0;
            --border: #d6e5de;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
            --shadow-accent: 0 4px 20px rgba(77, 166, 130, 0.25);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.3s var(--ease);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'SF Pro Display', 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(160deg, #e8f5ef 0%, #d4ede3 30%, #c8e6d8 60%, #e0f0e8 100%);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        a { color: inherit; text-decoration: none; }

        .header {
            max-width: 600px;
            width: 100%;
            padding: 48px 32px 0;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid rgba(214, 229, 222, 0.5);
            backdrop-filter: blur(8px);
        }
        .back:hover {
            transform: scale(1.08);
            box-shadow: var(--shadow-lg);
            background: rgba(255,255,255,0.9);
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #2d7a5a, #4da682);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 32px;
        }

        .joke-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            border: 1px solid rgba(214, 229, 222, 0.5);
        }

        .emoji {
            font-size: 4.5rem;
            margin-bottom: 24px;
            line-height: 1;
        }

        .joke {
            color: var(--text);
            font-size: 1.15rem;
            line-height: 1.9;
            margin-bottom: 36px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
        }

        .btn {
            background: linear-gradient(135deg, #4da682, #3a8a6a);
            color: white;
            border: none;
            padding: 14px 44px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-accent);
            font-family: inherit;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(77, 166, 130, 0.35);
        }
        .btn:active { transform: translateY(0); }

        .loading { color: var(--text-dim); }

        @media (max-width: 480px) {
            .header { padding: 32px 20px 0; }
            .container { padding: 24px 16px; }
            .joke-card { padding: 36px 24px; border-radius: 20px; }
            .joke { font-size: 1.05rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="back">←</a>
        <h1>随机笑话</h1>
    </header>

    <div class="container">
        <div class="joke-card">
            <div class="emoji" id="emoji">😄</div>
            <div class="joke" id="joke">加载中...</div>
            <button class="btn" onclick="getJoke()">再来一个</button>
        </div>
    </div>

    <script>

            "程序员的一天：写代码、改bug、写代码、改bug...然后下班。",
            "我下定决心要戒掉游戏，结果戒掉了游戏，没戒掉游戏瘾。",
            "别人的二十多岁：精致生活、健身旅游。我的二十多岁：电子游戏、外卖泡面。",
            "研究表明：90后平均月薪5000，却硬撑起了中国电影票房的半壁江山。",
            "研究表明：一个人孤独等级从低到高分别是：一个人逛超市、一个人吃饭、一个人去医院、一个人搬家、以及一个人过双十一。",
            "问：为什么程序员都喜欢穿格子衫？答：因为debug的时候好找bug。",
            "我以为我很孤独，原来大家都一样。大家都一样，就是都很孤独。",
            "你努力工作，老板换新车；你努力还房贷，房价涨更高；你努力存钱，通货膨胀更快。这大概就是选择比努力更重要吧。",
            "别人关心你飞得高不高，只有父母关心你飞累了没、吃了没、什么时候回家。",
            "世界上最远的距离不是生与死，而是我在打折你在犹豫，等你犹豫完东西卖光了。",
            "现在的年轻人，二十岁的年纪，六十岁的肩颈，七十岁的腰椎，零岁的睡眠。",
            "为什么胖的人比瘦的人更容易快乐？因为快乐是会传染的，胖的人一快乐，身边的人就也跟着快乐。",
            "本人现有三十岁存款九万，计划明年存到十万，加油！",
            "研究表明：一个人越成熟，就越难对很多事情感到兴奋。大概是因为成熟的人都学会了隐藏情绪。隐藏情绪最好的方式就是假装不在意。假装不在意最好的方式是——穷。",
            "我本以为人生最大的遗憾是爱而不得，后来发现更遗憾的是得而不爱。",
            "每次看到学霸的成绩单我都想：这人肯定每天熬夜学习吧。结果人家说：我从不熬夜。然后我懂了，这就是为什么我是学渣。",
            "当你觉得生活很难的时候，就想想那些比你难得多的人还在坚持，你凭什么放弃？然后你就更有动力去洗碗了。",
            "研究表明：一个人一生中平均会遇到8263563人，其中会打招呼的是39778人，熟悉的是3619人，亲密的是275人。而让你印象深刻、能记住你名字的，可能不超过10个。所以别把自己看得太重要，你没那么重要。",
            "我问妈妈：不结婚会怎样？妈妈说：你会很幸福。我又问：结婚了会怎样？妈妈说：看别人很幸福。",
            "减肥的动力不够？想象一下十年后同学聚会的场景，你就知道该放下筷子了。",
            "现在的年轻人，动不动就说'我太难了'。其实你不是难，你是穷。",
            "研究表明：说'我太难了'的人，99%都是边说边继续刷手机。",
            "人生如戏，全靠演技。但演技再好也逃不过穷。",
            "我有个朋友欠我2000块一年了，我不好意思催。后来我想通了：当初是我自己傻。现在我每次想催他的时候就提醒自己：你当初是怎么傻的？这钱就当交学费了。",
            "研究表明：一个人真正的成熟，是从学会自己做饭开始的。而大部分90后的成熟度是0。",
            "每次看到有人说'钱不是省出来的'，我就想问他：那你是怎么攒出首付的？",
            "为什么你总觉得自己不快乐？因为你既没有钱，又没有爱情，还不想努力。",
            "老板说'年轻人不要太看重钱'，这话我信了十年，直到我看到老板换了三辆车。",
            "问：如何让一个中国人瞬间开心？答：给他看不需要字幕的英语听力。",
            "朋友聚会自我介绍：我在某某公司上班。别人问：什么职位？我说：打杂。别人说：谦虚了。我：真没谦虚，就是打杂。",
            "我以为我考上大学就轻松了，后来发现轻松是给有准备的人说的，而我只准备了考试。",
            "研究表明：一个人掉头发的原因，80%是熬夜，20%是焦虑。而100%是既熬夜又焦虑。",
            "有人问我为什么每天都这么快乐？我说：因为我没有在看自己的银行卡余额。",
            "现在的年轻人最大的困惑是：想卷卷不动，想躺躺不平。",
            "我发现一个规律：每次你说'明天一定减肥'，第二天体重都会准时上涨0.5斤。",
            "我表弟今年高考，我问他想考什么大学？他说：清华。我问他成绩多少？他说：200分。我说那你可能需要换个目标。他说：不，我要为梦想窒息。我说：那你会先为成绩窒息。",
            "人生就像吃自助餐，不多吃点总觉得亏，但吃太多又撑得难受。这就是为什么人生总是很矛盾。",
            "问：为什么你单身？答：因为我丑。问：为什么不丑的人也是单身？答：因为穷。问：为什么不穷不丑的也是单身？答：因为挑。",
            "每次我以为我已经躺平了，社会就会把我拍得更平一点。",
            "研究表明：一个人成熟的标志是，开始理解父母的不容易。但大部分人理解父母不容易的方式是——自己也变成了父母，然后才明白。",
            "我发现我朋友越来越少，不是因为我没朋友了，而是因为我发现：朋友多了真的维护不起。",
            "现在的年轻人，一边喊着'躺平'，一边偷偷努力，生怕自己真的躺下去。",
            "问：什么是社恐？答：看到别人打招呼就假装看手机。问：什么是社牛？答：看到别人假装看手机还过去打招呼。",
            "我妈催我结婚的理由是：趁我们还能帮你带孩子。后来我发现，这理由的核心不是'帮我们带孩子'，而是'趁我们还能'。",
            "为什么你总觉得自己不够好？因为你在用别人的标准评价自己。而那些别人的标准，也是从别人那里借来的。",
            "研究表明：90%的烦恼都是因为想太多。剩下的10%是确实很烦恼，但又想太多。",
            "我朋友说他的梦想是环游世界。我说好巧，我的梦想也是。后来我发现，他是在计划怎么实现，我是在梦里想。",
            "人生就像升级打怪，你以为过了这个坎就好了，结果发现后面还有更多坎。但也因为这样，通关的时候才更有成就感。",
            "问：你为什么这么努力？答：因为我想让未来的自己，感谢现在的自己。问：那现在的你想对未来的自己说什么？答：对不起，让你受苦了。",
            "别总说'人间不值得'，你去过的地狱还太少。",
            "研究表明：一个人最怕的不是贫穷，而是贫穷的消息被朋友圈知道。",
            "别总说'钱不重要'，说这话的人往往都不缺钱。",
            "我朋友说他的工作是'钱多事少离家近'。我问他什么工作？他说：在自家店里看门。",
            "人生就像一盒巧克力，你永远不知道下一颗是什么味道。但如果你是胖子，下一颗一定是甜的。",
            "为什么你总遇到不到对的人？因为你自己也不是对的人。",
            "研究表明：单身久了会习惯，习惯了会更想单身，然后就更遇不到人，然后就更单身。别问我怎么知道的。",
            "有人说不要熬夜，我说好的。然后继续熬夜看这句话。",
            "小时候总想快快长大，长大后才发现，成年人的世界没有'容易'二字，只有'工资什么时候发'。",
            "问：为什么程序员都秃头？答：因为他们把头发都用在debug上了。问：为什么你不秃头？答：因为我不是程序员。",
            "世界上最浪漫的事不是你爱我，而是我爱你的时候，刚好你也爱我。不，最浪漫的事是：我爱你，你不知道，我偷偷爱了十年，然后你结婚了，新郎不是我。",
            "为什么你总觉得自己不幸运？因为幸运的人不会来看笑话。",
            "研究表明：一个人最快乐的时光是大学宿舍熄灯后和室友聊天的那半小时。因为那时候说的话，第二天大家都忘了。",
            "朋友问我为什么不发朋友圈了。我说：因为我的快乐不想让别人知道，我的悲伤不想让别人看到。朋友说：那你还发什么。我说：发段子。",
            "人生就像心电图，一帆风顺就说明你快挂了。",
            "别总说'我太难了'，比你难的人多了去了，你只是难在错误的地方。",
            "研究表明：一个人之所以能成功，是因为他失败的时候没有放弃。而一个人之所以失败，是因为他成功的时候以为自己不会再失败了。",
            "有时候我觉得我就是来这个世界凑数的，凑人数、凑字数、凑热闹。",
            "问：你相信努力就会成功吗？答：相信。问：那你现在成功了吗？答：没有。问：那你为什么还相信？答：因为不相信会更惨。相信努力不一定成功，但不相信努力，那是肯定不会成功的。所以相信比不相信好。就这么简单。",
            "别总说'人间不值得'，你都没有好好逛过人间，怎么知道不值得？",
            "我发现一个规律：每次你说'今天一定要早睡'，结果都会晚睡。定计划的时候越兴奋，执行的时候越打脸。",
            "朋友说他的座右铭是'活在当下'。我说好巧，我的座右铭是'活在当下和回忆过去之间反复横跳'。",
            "为什么你总羡慕别人的生活？因为你只看到了别人的A面，没看到别人的B面。C面和D面你更看不到。每个人都有自己不为人知的一面，别羡慕了，你羡慕别人的同时，别人也在羡慕你。",
            "朋友说他的梦想是财务自由。我说好巧，我的梦想也是。但区别是：他在计划如何实现，我在想财务自由了要不要辞职。",
            "研究表明：一个人之所以无聊，是因为他没有找到自己真正感兴趣的事。而一个人之所以找不到感兴趣的事，是因为他一直在刷手机。别刷了，看完这个笑话就去寻找你的兴趣吧。",

            "别总说'我不配'，你配不配不是别人说了算，是你的行动决定的。你行动了吗？没有。所以你确实不配。但你可以变配。",

            "别总说'我太难了'，比你难的人多了去了。但这不是让你更难过，而是让你知道，大家都不容易，所以你也不用太苛刻自己。偶尔难过一下是可以的，难过完了继续努力。",
            "研究表明：一个人之所以能成功，是因为他失败的时候没有放弃。而一个人之所以失败，是因为他成功的时候以为自己不会再失败了。别笑，这话很有道理。成功的时候保持警惕，失败的时候保持信心，这才是正确的姿势。",
        ];

        let lastIndex = -1;

        function getJoke() {
            const jokeEl = document.getElementById('joke');
            const emojiEl = document.getElementById('emoji');

            jokeEl.textContent = '加载中...';

            let index;
            do {
                index = Math.floor(Math.random() * jokes.length);
            } while (index === lastIndex && jokes.length > 1);

            lastIndex = index;

            setTimeout(() => {
                jokeEl.textContent = jokes[index];

                const emojis = ['😄', '😂', '🤣', '😊', '😎', '🤔', '😅', '😜', '🤭', '😁'];
                emojiEl.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            }, 200);
        }

        getJoke();
    </script>
</body>
</html>
