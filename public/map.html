<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行足迹 — 马莅格的成长记录</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        :root {
            --bg: #f4f8f6;
            --bg-card: #ffffff;
            --bg-elevated: #eaf2ee;
            --accent: #4da682;
            --accent-dark: #3a8a6a;
            --accent-light: #a3d9c0;
            --accent-dim: rgba(77, 166, 130, 0.08);
            --text: #1e2e28;
            --text-secondary: #5a7a6e;
            --text-dim: #8fa8a0;
            --border: #d6e5de;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.3s var(--ease);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'SF Pro Display', 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        a { color: inherit; text-decoration: none; }

        /* ======== Global Nav ======== */
        .global-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }
        .global-nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 52px;
            gap: 2px;
        }
        .global-nav .nav-brand {
            font-weight: 700;
            font-size: 0.92rem;
            color: var(--accent-dark);
            margin-right: 16px;
            white-space: nowrap;
        }
        .global-nav .nav-item {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: transparent;
            font-family: inherit;
            text-decoration: none;
        }
        .global-nav .nav-item:hover { background: var(--accent-dim); color: var(--accent-dark); }
        .global-nav .nav-item.active {
            background: var(--accent-dim);
            color: var(--accent-dark);
            font-weight: 600;
        }
        .global-nav .nav-spacer { flex: 1; }
        .global-nav .nav-stat {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        @media (max-width: 768px) {
            .global-nav-inner { height: auto; padding: 8px 0; flex-wrap: wrap; gap: 2px; }
            .global-nav .nav-brand { width: 100%; margin-right: 0; }
            .global-nav .nav-item { font-size: 0.78rem; padding: 5px 10px; }
            .global-nav { padding: 0 12px; }
        }

        /* Year pills */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            background: rgba(255,255,255,0.7);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 999;
            flex-wrap: wrap;
        }
        .filter-bar label { font-size: 0.82rem; color: var(--text-dim); }
        .year-pills {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .year-pill {
            padding: 5px 14px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            transition: var(--transition);
        }
        .year-pill:hover { border-color: var(--accent); color: var(--accent-dark); }
        .year-pill.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent-dark);
            font-weight: 500;
        }

        /* Map */
        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
        }

        /* Popup */
        .map-popup {
            text-align: center;
            min-width: 160px;
        }
        .map-popup img {
            width: 100%;
            max-width: 200px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
            display: block;
        }
        .map-popup .popup-date {
            font-size: 0.78rem;
            color: var(--text-dim);
            margin-bottom: 4px;
        }
        .map-popup .popup-desc {
            font-size: 0.85rem;
            color: var(--text);
            font-weight: 500;
        }
        .map-popup .popup-video-badge {
            display: inline-block;
            padding: 2px 10px;
            background: var(--accent);
            color: #fff;
            border-radius: 6px;
            font-size: 0.72rem;
            margin-top: 4px;
        }

        /* Leaflet overrides */
        .leaflet-popup-content-wrapper {
            border-radius: 12px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15) !important;
        }
        .leaflet-popup-content { margin: 12px 14px !important; }
        .leaflet-popup-close-button { top: 8px !important; right: 8px !important; }

        /* MarkerCluster overrides */
        .marker-cluster-small {
            background-color: rgba(77, 166, 130, 0.3) !important;
        }
        .marker-cluster-small div {
            background-color: rgba(77, 166, 130, 0.7) !important;
            color: #fff !important;
            font-weight: 600 !important;
        }
        .marker-cluster-medium {
            background-color: rgba(77, 166, 130, 0.3) !important;
        }
        .marker-cluster-medium div {
            background-color: rgba(58, 138, 106, 0.8) !important;
            color: #fff !important;
            font-weight: 600 !important;
        }
        .marker-cluster-large {
            background-color: rgba(58, 138, 106, 0.3) !important;
        }
        .marker-cluster-large div {
            background-color: rgba(45, 122, 90, 0.9) !important;
            color: #fff !important;
            font-weight: 600 !important;
        }

        /* Empty state */
        .empty-state {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            border-radius: var(--radius);
            padding: 40px 48px;
            text-align: center;
            box-shadow: 0 12px 48px rgba(0,0,0,0.12);
            z-index: 500;
            border: 1px solid var(--border);
        }
        .empty-state.show { display: block; }
        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }
        .empty-state h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 0.88rem;
            color: var(--text-dim);
        }

        @media (max-width: 768px) {
            .top-nav { padding: 10px 16px; flex-wrap: wrap; }
            .top-nav .nav-stat { flex-basis: 100%; text-align: right; }
            .filter-bar { padding: 8px 16px; }
            .map-popup { min-width: 120px; }
            .map-popup img { max-width: 150px; height: 90px; }
        }
    </style>
</head>
<body>

    <!-- Global Nav -->
    <nav class="global-nav">
        <div class="global-nav-inner">
            <span class="nav-brand">🌱 成长记录</span>
            <a class="nav-item" href="/">🏠 首页</a>
            <a class="nav-item" href="/milestones">🏆 里程碑</a>
            <a class="nav-item" href="/growth">📈 成长曲线</a>
            <a class="nav-item active" href="/map">🌍 旅行足迹</a>
            <span class="nav-spacer"></span>
            <span class="nav-stat" id="navStat">加载中...</span>
        </div>
    </nav>

    <div class="filter-bar">
        <label>筛选年份</label>
        <div class="year-pills" id="yearPills">
            <button class="year-pill active" onclick="setYear('all', this)">全部</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="empty-state" id="emptyState">
        <div class="icon">🗺️</div>
        <h3>还没有带位置的照片</h3>
        <p>上传带 GPS 信息的照片后，它们会出现在地图上</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script>
        const map = L.map('map', {
            center: [35, 110],
            zoom: 4,
            zoomControl: true,
            attributionControl: true
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 18
        }).addTo(map);

        const markerGroup = L.markerClusterGroup({
            maxClusterRadius: 50,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            zoomToBoundsOnClick: true,
            disableClusteringAtZoom: 16
        });

        let allPhotos = [];
        let markers = [];
        let currentYear = 'all';

        function formatDate(s) {
            const d = new Date(s);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function createIcon(isVideo) {
            const color = isVideo ? '#3a8a6a' : '#4da682';
            const shadow = isVideo ? '#2d7a5a' : '#3a8a6a';
            return L.divIcon({
                className: '',
                html: `<div style="
                    width:32px;height:32px;
                    background:linear-gradient(135deg,${color},${shadow});
                    border:2px solid #fff;
                    border-radius:50%;
                    display:flex;align-items:center;justify-content:center;
                    box-shadow:0 2px 8px rgba(0,0,0,0.25);
                    font-size:14px;
                    color:#fff;
                    font-weight:bold;
                ">${isVideo ? '&#9654;' : ''}</div>`,
                iconSize: [32, 32],
                iconAnchor: [16, 16],
                popupAnchor: [0, -18]
            });
        }

        function loadMapData() {
            let url = '/api/photos/map';
            if (currentYear !== 'all') url += `?year=${currentYear}`;

            fetch(url)
                .then(r => r.json())
                .then(d => {
                    allPhotos = d.photos;
                    renderMarkers();
                    updateStats();
                })
                .catch(e => {
                    console.error(e);
                    document.getElementById('navStat').textContent = '加载失败';
                });
        }

        function renderMarkers() {
            markerGroup.clearLayers();
            markers = [];

            if (allPhotos.length === 0) {
                document.getElementById('emptyState').classList.add('show');
                return;
            }
            document.getElementById('emptyState').classList.remove('show');

            const bounds = [];
            allPhotos.forEach(p => {
                if (!p.latitude || !p.longitude) return;
                const isVideo = p.file_type === 'video';
                const icon = createIcon(isVideo);
                const thumbSrc = `/thumbnails/${p.filename}`;
                const mediaSrc = isVideo ? `/videos/${p.filename}` : `/photos/${p.filename}`;
                const dateStr = formatDate(p.taken_at);
                const desc = p.description || '';

                const popupHtml = `
                    <div class="map-popup">
                        ${isVideo
                            ? `<div style="width:100%;max-width:200px;height:120px;background:linear-gradient(135deg,#4da682,#2d7a5a);border-radius:8px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:rgba(255,255,255,0.8);">▶</div>`
                            : `<img src="${thumbSrc}" alt="" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22120%22><rect fill=%22%23eaf2ee%22 width=%22200%22 height=%22120%22/></svg>'">`
                        }
                        <div class="popup-date">${dateStr}</div>
                        ${desc ? `<div class="popup-desc">${desc}</div>` : ''}
                        ${isVideo ? '<div class="popup-video-badge">视频</div>' : ''}
                        <div style="margin-top:6px;">
                            <a href="${mediaSrc}" target="_blank" style="font-size:0.78rem;color:var(--accent-dark);text-decoration:underline;">查看大图</a>
                        </div>
                    </div>
                `;

                const marker = L.marker([p.latitude, p.longitude], { icon });
                marker.bindPopup(popupHtml, { maxWidth: 240, className: '' });
                markerGroup.addLayer(marker);
                markers.push(marker);
                bounds.push([p.latitude, p.longitude]);
            });

            map.addLayer(markerGroup);

            if (bounds.length > 1) {
                map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
            } else if (bounds.length === 1) {
                map.setView(bounds[0], 12);
            }
        }

        function updateStats() {
            const total = allPhotos.length;
            if (total === 0) {
                document.getElementById('navStat').textContent = '暂无带 GPS 的照片';
                return;
            }
            const years = [...new Set(allPhotos.map(p => new Date(p.taken_at).getFullYear()).filter(y => !isNaN(y)))].length;
            document.getElementById('navStat').textContent = `${total} 张照片 · ${years} 个年份`;
        }

        function setYear(year, btn) {
            currentYear = year;
            document.querySelectorAll('.year-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadMapData();
        }

        // Load year pills
        function loadYears() {
            fetch('/api/photos/map')
                .then(r => r.json())
                .then(d => {
                    const years = [...new Set(d.photos.map(p => new Date(p.taken_at).getFullYear()).filter(y => !isNaN(y)))].sort((a,b) => b - a);
                    const container = document.getElementById('yearPills');
                    years.forEach(y => {
                        const btn = document.createElement('button');
                        btn.className = 'year-pill';
                        btn.textContent = y;
                        btn.onclick = () => setYear(y, btn);
                        container.appendChild(btn);
                    });
                })
                .catch(e => console.error(e));
        }

        loadYears();
        loadMapData();
    </script>
</body>
</html>
