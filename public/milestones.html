<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成长里程碑 — 马莅格的成长记录</title>
    <style>
        :root {
            --bg: #f4f8f6;
            --bg-card: #ffffff;
            --bg-elevated: #eaf2ee;
            --accent: #4da682;
            --accent-dark: #3a8a6a;
            --accent-light: #a3d9c0;
            --accent-dim: rgba(77, 166, 130, 0.08);
            --text: #1e2e28;
            --text-secondary: #5a7a6e;
            --text-dim: #8fa8a0;
            --border: #d6e5de;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
            --shadow-accent: 0 4px 20px rgba(77, 166, 130, 0.25);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.3s var(--ease);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'SF Pro Display', 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        a { color: inherit; text-decoration: none; }

        /* ======== Global Nav ======== */
        .global-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }
        .global-nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 52px;
            gap: 2px;
        }
        .global-nav .nav-brand {
            font-weight: 700;
            font-size: 0.92rem;
            color: var(--accent-dark);
            margin-right: 16px;
            white-space: nowrap;
        }
        .global-nav .nav-item {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: transparent;
            font-family: inherit;
            text-decoration: none;
        }
        .global-nav .nav-item:hover { background: var(--accent-dim); color: var(--accent-dark); }
        .global-nav .nav-item.active {
            background: var(--accent-dim);
            color: var(--accent-dark);
            font-weight: 600;
        }
        .global-nav .nav-spacer { flex: 1; }
        .global-nav .nav-upload-btn {
            padding: 6px 18px;
            background: linear-gradient(135deg, #4da682, #3a8a6a);
            color: #fff;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition);
        }
        .global-nav .nav-upload-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(77,166,130,0.3); }
        @media (max-width: 768px) {
            .global-nav-inner { height: auto; padding: 8px 0; flex-wrap: wrap; gap: 2px; }
            .global-nav .nav-brand { width: 100%; margin-right: 0; }
            .global-nav .nav-item { font-size: 0.78rem; padding: 5px 10px; }
            .global-nav { padding: 0 12px; }
        }

        /* Hero */
        .hero {
            padding: 60px 32px 50px;
            text-align: center;
            background: linear-gradient(160deg, #f0e8f5 0%, #e3d4ed 30%, #d8c8e6 60%, #ece0f0 100%);
        }
        .hero h1 {
            font-size: 2rem; font-weight: 700; letter-spacing: -0.03em;
            background: linear-gradient(135deg, #7a4da6, #a682da, #8a6ac4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .hero .subtitle {
            font-size: 0.9rem; color: var(--text-secondary); letter-spacing: 0.1em;
        }

        /* Stats */
        .stats-row {
            max-width: 800px; margin: -28px auto 0; padding: 0 32px;
            display: flex; gap: 12px; position: relative; z-index: 2; flex-wrap: wrap;
        }
        .stat-card {
            flex: 1; min-width: 90px; background: var(--bg-card);
            border-radius: var(--radius); padding: 18px 14px; text-align: center;
            box-shadow: var(--shadow); border: 1px solid rgba(214,229,222,0.5);
        }
        .stat-card .stat-num {
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(135deg, #7a4da6, #a682da);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1.2;
        }
        .stat-card .stat-label { font-size: 0.72rem; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.05em; }

        /* Main */
        .main { max-width: 1000px; margin: 0 auto; padding: 40px 32px 80px; }

        .section-title {
            font-size: 1.1rem; font-weight: 600; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* Timeline */
        .timeline { margin-bottom: 48px; }

        .milestone-card {
            display: flex; gap: 20px;
            padding: 20px 0; position: relative;
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
        }
        .milestone-card:last-child { border-bottom: none; }
        .milestone-card:hover { padding-left: 8px; }

        /* Timeline dot + line */
        .milestone-card::before {
            content: '';
            flex-shrink: 0;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--accent);
            margin-top: 6px;
            box-shadow: 0 0 0 3px rgba(77,166,130,0.2);
            position: relative;
            z-index: 1;
        }
        .timeline.has-items {
            position: relative;
            padding-left: 0;
        }
        .timeline.has-items .milestone-card::after {
            content: '';
            position: absolute;
            left: 5px; top: 32px; bottom: -1px;
            width: 2px;
            background: linear-gradient(180deg, var(--accent-light), var(--border));
        }
        .timeline.has-items .milestone-card:last-child::after { display: none; }

        .milestone-card .mc-body { flex: 1; min-width: 0; }
        .milestone-card .mc-header {
            display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .milestone-card .mc-title {
            font-size: 1rem; font-weight: 600; color: var(--text);
        }
        .milestone-card .mc-category {
            font-size: 0.72rem; padding: 2px 10px;
            border-radius: 20px; background: var(--accent-dim);
            color: var(--accent-dark);
        }
        .milestone-card .mc-date {
            font-size: 0.82rem; color: var(--text-dim);
            margin-left: auto; white-space: nowrap;
        }
        .milestone-card .mc-desc {
            font-size: 0.88rem; color: var(--text-secondary);
            margin-top: 4px; line-height: 1.5;
        }
        .milestone-card .mc-age {
            display: inline-block;
            font-size: 0.78rem; color: var(--accent-dark);
            background: var(--accent-dim);
            padding: 2px 10px; border-radius: 20px;
            margin-top: 6px;
        }
        .milestone-card .mc-del {
            align-self: center;
            padding: 6px 12px;
            border: 1px solid rgba(232,124,124,0.3);
            background: transparent; color: #e88;
            border-radius: var(--radius-xs);
            cursor: pointer; font-size: 0.78rem; font-family: inherit;
            transition: var(--transition); opacity: 0;
        }
        .milestone-card:hover .mc-del { opacity: 1; }
        .milestone-card .mc-del:hover { background: #e87c7c; border-color: #e87c7c; color: #fff; }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 80px 20px; color: var(--text-dim);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-state h3 { font-size: 1.1rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
        .empty-state p { font-size: 0.88rem; }

        /* ── Predefined Milestones ── */
        .predef-section { margin-bottom: 40px; }

        .cat-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px; margin-bottom: 24px;
        }
        .cat-title {
            font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);
            margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
        }

        .predef-item {
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            font-size: 0.82rem;
            font-family: inherit;
            color: var(--text);
            position: relative;
            overflow: hidden;
        }
        .predef-item:hover {
            border-color: var(--accent-light);
            background: var(--accent-dim);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .predef-item.done {
            border-color: var(--accent);
            background: rgba(77,166,130,0.06);
            cursor: default;
        }
        .predef-item.done::after {
            content: '✓';
            position: absolute;
            top: 4px; right: 8px;
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: bold;
        }
        .predef-item .pi-icon { font-size: 1.2rem; margin-bottom: 4px; }
        .predef-item .pi-label { line-height: 1.3; }
        .predef-item.done:hover { transform: none; box-shadow: none; }

        /* ── Custom Form ── */
        .form-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 28px 32px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(214,229,222,0.4);
            margin-bottom: 24px;
        }
        .form-row {
            display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end;
        }
        .form-group {
            display: flex; flex-direction: column; gap: 5px;
        }
        .form-group label {
            font-size: 0.78rem; color: var(--text-dim); font-weight: 500;
        }
        .form-group input, .form-group select {
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.88rem; font-family: inherit;
            background: var(--bg-elevated);
            color: var(--text);
            transition: var(--transition);
            min-width: 150px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(77,166,130,0.1);
        }
        .form-btn {
            padding: 10px 28px;
            background: linear-gradient(135deg, #7a4da6, #a682da);
            color: #fff; border: none;
            border-radius: var(--radius-sm);
            font-size: 0.88rem; font-weight: 500; font-family: inherit;
            cursor: pointer; transition: var(--transition);
            box-shadow: 0 4px 20px rgba(122,77,166,0.25);
            white-space: nowrap;
        }
        .form-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(122,77,166,0.3);
        }

        /* Birth setup */
        .birth-setup {
            display: none; margin-top: 14px;
            padding: 16px 20px;
            background: var(--accent-dim);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(77,166,130,0.2);
        }
        .birth-setup.show { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
        .birth-setup label { font-size: 0.85rem; color: var(--text-secondary); }
        .birth-setup input {
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 0.85rem; font-family: inherit;
            background: var(--bg-card);
        }
        .birth-setup .hint { font-size: 0.78rem; color: var(--text-dim); flex-basis: 100%; }

        /* ======== Date Picker Modal ======== */
        .date-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(14, 22, 18, 0.6);
            backdrop-filter: blur(8px);
            z-index: 4000;
            align-items: center;
            justify-content: center;
        }
        .date-modal-overlay.active { display: flex; }
        .date-modal-box {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 32px 36px;
            width: 340px;
            text-align: center;
            box-shadow: 0 32px 80px rgba(0,0,0,0.3);
        }
        .date-modal-box h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
        }
        .date-modal-box .dm-sub {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 16px;
        }
        .date-modal-box .dm-row {
            margin-bottom: 12px;
        }
        .date-modal-box .dm-row label {
            display: block;
            font-size: 0.78rem;
            color: var(--text-dim);
            font-weight: 500;
            margin-bottom: 4px;
            text-align: left;
        }
        .date-modal-box .dm-date-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--bg-elevated);
            color: var(--text);
            text-align: center;
            transition: var(--transition);
        }
        .date-modal-box .dm-date-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(77,166,130,0.1);
        }
        .date-modal-box .dm-month-row {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }
        .date-modal-box .dm-month-input {
            width: 90px;
            padding: 10px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: inherit;
            background: var(--bg-elevated);
            color: var(--text);
            text-align: center;
            transition: var(--transition);
        }
        .date-modal-box .dm-month-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(77,166,130,0.1);
        }
        .date-modal-box .dm-month-unit {
            font-size: 0.88rem;
            color: var(--text-secondary);
        }
        .date-modal-box .dm-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            color: var(--text-dim);
            font-size: 0.78rem;
        }
        .date-modal-box .dm-divider::before,
        .date-modal-box .dm-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .date-modal-box .dm-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .date-modal-box .dm-btn {
            flex: 1;
            padding: 11px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            font-family: inherit;
            transition: var(--transition);
            border: none;
        }
        .date-modal-box .dm-btn.cancel {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .date-modal-box .dm-btn.cancel:hover { border-color: var(--text-dim); }
        .date-modal-box .dm-btn.confirm {
            background: linear-gradient(135deg, #7a4da6, #a682da);
            color: #fff;
        }
        .date-modal-box .dm-btn.confirm:hover { box-shadow: 0 4px 16px rgba(122,77,166,0.3); }
        .date-modal-box .dm-age {
            font-size: 0.78rem;
            color: var(--accent-dark);
            margin-top: 8px;
            min-height: 1.2em;
        }

        .birth-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 14px; background: var(--accent-dim);
            border-radius: 20px; font-size: 0.82rem;
            color: var(--accent-dark); cursor: pointer;
            transition: var(--transition);
        }
        .birth-badge:hover { background: rgba(77,166,130,0.15); }

        /* Toast */
        .toast {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(255,255,255,0.95);
            border: 1px solid var(--accent-light);
            border-radius: 14px; padding: 14px 28px;
            font-size: 0.88rem; color: var(--text);
            box-shadow: var(--shadow-lg); z-index: 5000;
            opacity: 0; transition: opacity 0.3s, transform 0.3s;
            pointer-events: none; backdrop-filter: blur(12px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) {
            .hero { padding: 48px 20px 40px; }
            .hero h1 { font-size: 1.5rem; }
            .stats-row { padding: 0 16px; gap: 8px; }
            .stat-card { padding: 14px 10px; min-width: 70px; }
            .stat-card .stat-num { font-size: 1.2rem; }
            .main { padding: 24px 16px 60px; }
            .cat-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
            .form-row { flex-direction: column; }
            .form-group input { min-width: 100%; }
            .milestone-card .mc-del { opacity: 1; }
            .top-nav { padding: 10px 16px; }
        }
    </style>
</head>
<body>

    <!-- Global Nav -->
    <nav class="global-nav">
        <div class="global-nav-inner">
            <span class="nav-brand">🌱 成长记录</span>
            <a class="nav-item" href="/">🏠 首页</a>
            <a class="nav-item active" href="/milestones">🏆 里程碑</a>
            <a class="nav-item" href="/growth">📈 成长曲线</a>
            <a class="nav-item" href="/map">🌍 旅行足迹</a>
            <span class="nav-spacer"></span>
            <button class="nav-upload-btn" onclick="location.href='/'">+ 上传</button>
        </div>
    </nav>

    <section class="hero">
        <h1>成长里程碑</h1>
        <div class="subtitle">记录每一个第一次</div>
    </section>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="sTotal">0</div><div class="stat-label">里程碑</div></div>
        <div class="stat-card"><div class="stat-num" id="sCategories">0</div><div class="stat-label">类别</div></div>
        <div class="stat-card"><div class="stat-num" id="sThisYear">0</div><div class="stat-label">今年新增</div></div>
        <div class="stat-card"><div class="stat-num" id="sProgress">0%</div><div class="stat-label">达成率</div></div>
    </div>

    <main class="main">

        <!-- Timeline -->
        <div class="section-title">里程碑时间线</div>
        <div class="timeline has-items" id="timeline"></div>

        <!-- Predefined -->
        <div class="section-title">记录新里程碑</div>

        <div class="form-card">
            <div class="cat-title" id="catMotor">🏃 运动发展</div>
            <div class="cat-grid" id="gridMotor"></div>
            <div class="cat-title" id="catLanguage">🗣️ 语言发展</div>
            <div class="cat-grid" id="gridLanguage"></div>
            <div class="cat-title" id="catCognitive">🧠 认知发展</div>
            <div class="cat-grid" id="gridCognitive"></div>
            <div class="cat-title" id="catSocial">💕 社交情感</div>
            <div class="cat-grid" id="gridSocial"></div>
            <div class="cat-title" id="catLife">🎉 生活事件</div>
            <div class="cat-grid" id="gridLife"></div>
        </div>

        <div class="form-card">
            <div class="cat-title">✏️ 自定义里程碑</div>
            <div class="form-row">
                <div class="form-group">
                    <label>名称</label>
                    <input type="text" id="fTitle" placeholder="如：第一次去海边" style="min-width:180px">
                </div>
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="fDate">
                </div>
                <div class="form-group">
                    <label>类别</label>
                    <select id="fCategory">
                        <option value="运动发展">🏃 运动发展</option>
                        <option value="语言发展">🗣️ 语言发展</option>
                        <option value="认知发展">🧠 认知发展</option>
                        <option value="社交情感">💕 社交情感</option>
                        <option value="生活事件">🎉 生活事件</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="fDesc" placeholder="可选" style="min-width:160px">
                </div>
                <button class="form-btn" onclick="addCustomMilestone()">添加</button>
            </div>
            <div style="margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <span class="birth-badge" id="birthBadge" onclick="showBirthSetup()">📅 设置出生日期</span>
                <span style="font-size:0.78rem;color:var(--text-dim);">设置后自动计算月龄</span>
            </div>
            <div class="birth-setup" id="birthSetup">
                <label>出生日期</label>
                <input type="date" id="birthDateInput">
                <button class="form-btn" style="padding:8px 18px;font-size:0.82rem;" onclick="saveBirthDate()">保存</button>
                <div class="hint">设置后所有里程碑自动显示月龄</div>
            </div>
        </div>

    </main>

    <!-- Date Picker Modal -->
    <div class="date-modal-overlay" id="dateModal">
        <div class="date-modal-box">
            <h3 id="dmTitle">记录里程碑</h3>
            <div class="dm-sub" id="dmSub">选择发生日期</div>
            <div class="dm-row">
                <label>精确日期</label>
                <input type="date" id="dmDate" class="dm-date-input">
            </div>
            <div class="dm-divider">或者</div>
            <div class="dm-row">
                <label>大概月龄（从出生算起）</label>
                <div class="dm-month-row">
                    <input type="number" id="dmMonths" class="dm-month-input" min="0" max="60" step="0.5" placeholder="3">
                    <span class="dm-month-unit">个月</span>
                </div>
            </div>
            <div class="dm-age" id="dmAge"></div>
            <div class="dm-btns">
                <button class="dm-btn cancel" onclick="closeDateModal()">取消</button>
                <button class="dm-btn confirm" onclick="confirmDateModal()">确认</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ── Predefined milestones ──
        const CATEGORIES = {
            motor: {
                id: 'motor', label: '运动发展', icon: '🏃',
                items: [
                    '第一次抬头', '第一次翻身', '第一次坐起来',
                    '第一次爬行', '第一次扶站', '第一次独立站立',
                    '第一次走路', '第一次跑步', '第一次跳',
                    '第一次上楼梯', '第一次骑车', '第一次自己吃饭'
                ]
            },
            language: {
                id: 'language', label: '语言发展', icon: '🗣️',
                items: [
                    '第一次笑出声', '第一次叫爸爸', '第一次叫妈妈',
                    '第一个词语', '第一次说三个字', '第一次说完整句子',
                    '第一次背唐诗', '第一次唱歌', '第一次数数'
                ]
            },
            cognitive: {
                id: 'cognitive', label: '认知发展', icon: '🧠',
                items: [
                    '第一次认出镜子中的自己', '第一次挥手再见', '第一次指物要东西',
                    '第一次自己刷牙', '第一次自己穿鞋', '第一次自己穿衣服',
                    '第一次自己上厕所', '第一次自己洗手', '第一次认识颜色'
                ]
            },
            social: {
                id: 'social', label: '社交情感', icon: '💕',
                items: [
                    '第一次社交性微笑', '第一次认生', '第一次交朋友',
                    '第一次分享玩具', '第一次说"我爱你"', '第一次主动拥抱',
                    '第一次表达情绪', '第一次说"谢谢"', '第一次说"对不起"'
                ]
            },
            life: {
                id: 'life', label: '生活事件', icon: '🎉',
                items: [
                    '第一次过生日', '第一次去公园', '第一次去游泳',
                    '第一次去海边', '第一次看雪', '第一次坐飞机',
                    '第一天上幼儿园', '第一次看电影', '第一次上台表演'
                ]
            }
        };

        // ── State ──
        let milestones = [];
        let birthDate = localStorage.getItem('milestoneBirthDate') || '';
        const PREDEF_TOTAL = Object.values(CATEGORIES).reduce((s, c) => s + c.items.length, 0);

        // ── Init ──
        document.addEventListener('DOMContentLoaded', () => {
            if (birthDate) {
                document.getElementById('birthBadge').innerHTML = `📅 出生 ${birthDate}`;
            }
            loadMilestones();
            document.getElementById('fDate').addEventListener('focus', function() {
                if (!this.value) this.value = new Date().toISOString().split('T')[0];
            });
        });

        // ── API ──
        async function loadMilestones() {
            try {
                const r = await fetch('/api/milestones');
                const d = await r.json();
                milestones = d.milestones;
                renderAll();
            } catch (e) { console.error(e); showToast('加载失败'); }
        }

        async function addMilestoneAPI(data) {
            try {
                const r = await fetch('/api/milestones', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!r.ok) throw new Error('Failed');
                showToast('🎉 里程碑已记录！');
                await loadMilestones();
                return true;
            } catch (e) {
                console.error(e);
                showToast('保存失败');
                return false;
            }
        }

        async function deleteMilestone(id) {
            try {
                await fetch(`/api/milestones/${id}`, { method: 'DELETE' });
                showToast('已删除');
                await loadMilestones();
            } catch (e) { console.error(e); showToast('删除失败'); }
        }

        // ── Render ──
        function renderAll() {
            renderStats();
            renderTimeline();
            renderPredef();
        }

        function renderStats() {
            const total = milestones.length;
            const cats = [...new Set(milestones.map(m => m.category).filter(Boolean))].length;
            const thisYear = milestones.filter(m => {
                const y = new Date(m.milestone_date).getFullYear();
                return y === new Date().getFullYear();
            }).length;
            const pct = PREDEF_TOTAL > 0 ? Math.round((total / PREDEF_TOTAL) * 100) : 0;
            document.getElementById('sTotal').textContent = total;
            document.getElementById('sCategories').textContent = cats;
            document.getElementById('sThisYear').textContent = thisYear;
            document.getElementById('sProgress').textContent = Math.min(pct, 100) + '%';
        }

        function dateToMonths(dateStr, birthStr) {
            if (!birthStr) return null;
            const d = new Date(dateStr), b = new Date(birthStr);
            if (isNaN(d) || isNaN(b)) return null;
            const diffMs = d - b;
            if (diffMs < 0) return null;
            return diffMs / (1000 * 60 * 60 * 24 * 30.4375);
        }

        function monthsToDate(months, birthStr) {
            if (!birthStr || months === '' || months === null || months === undefined) return null;
            const m = parseFloat(months);
            if (isNaN(m) || m < 0) return null;
            const b = new Date(birthStr);
            if (isNaN(b)) return null;
            const d = new Date(b);
            d.setMonth(d.getMonth() + Math.floor(m));
            const remainder = m - Math.floor(m);
            if (remainder > 0) d.setDate(d.getDate() + Math.round(remainder * 30.4375));
            return d.toISOString().split('T')[0];
        }

        function formatDate(s) {
            const d = new Date(s);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function getAgeStr(record) {
            if (record.age_months !== null && record.age_months !== undefined) {
                return record.age_months.toFixed(1) + ' 个月';
            }
            if (birthDate) {
                const m = dateToMonths(record.milestone_date, birthDate);
                if (m !== null) return m.toFixed(1) + ' 个月';
            }
            return '';
        }

        function renderTimeline() {
            const el = document.getElementById('timeline');
            if (milestones.length === 0) {
                el.innerHTML = `<div class="empty-state">
                    <div class="icon">⭐</div>
                    <h3>还没有里程碑记录</h3>
                    <p>点击下方的预设里程碑或自定义添加</p>
                </div>`;
                el.classList.remove('has-items');
                return;
            }
            el.classList.add('has-items');

            const sorted = [...milestones].sort((a, b) => new Date(b.milestone_date) - new Date(a.milestone_date));
            el.innerHTML = sorted.map(m => {
                const ageStr = getAgeStr(m);
                return `<div class="milestone-card">
                    <div class="mc-body">
                        <div class="mc-header">
                            <span class="mc-title">${m.title}</span>
                            ${m.category ? `<span class="mc-category">${m.category}</span>` : ''}
                            <span class="mc-date">${formatDate(m.milestone_date)}</span>
                        </div>
                        ${m.description ? `<div class="mc-desc">${m.description}</div>` : ''}
                        ${ageStr ? `<div class="mc-age">${ageStr}</div>` : ''}
                    </div>
                    <button class="mc-del" onclick="deleteMilestone(${m.id})">删除</button>
                </div>`;
            }).join('');
        }

        function renderPredef() {
            const doneTitles = new Set(milestones.map(m => m.title));
            Object.keys(CATEGORIES).forEach(key => {
                const cat = CATEGORIES[key];
                const grid = document.getElementById('grid' + key.charAt(0).toUpperCase() + key.slice(1));
                if (!grid) return;
                grid.innerHTML = cat.items.map(item => {
                    const isDone = doneTitles.has(item);
                    return `<button class="predef-item${isDone ? ' done' : ''}"
                        onclick="${isDone ? '' : "recordPredef('" + item + "','" + cat.label + "')"}"
                        ${isDone ? 'disabled' : ''}>
                        <div class="pi-icon">${cat.icon}</div>
                        <div class="pi-label">${item}</div>
                    </button>`;
                }).join('');
            });
        }

        // ── Date Picker Modal for Predefined Milestones ──
        let pendingMilestone = null;

        function recordPredef(title, category) {
            pendingMilestone = { title, category };
            document.getElementById('dmTitle').textContent = title;
            document.getElementById('dmSub').textContent = '这个里程碑是什么时候发生的？';
            document.getElementById('dmDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('dmMonths').value = '';
            document.getElementById('dmAge').textContent = '';
            document.getElementById('dateModal').classList.add('active');
            document.getElementById('dmDate').focus();
            // 点击日期输入框展开日历
            setTimeout(() => document.getElementById('dmDate').showPicker?.(), 100);
        }

        function closeDateModal() {
            document.getElementById('dateModal').classList.remove('active');
            pendingMilestone = null;
        }

        function confirmDateModal() {
            if (!pendingMilestone) return;

            let date = document.getElementById('dmDate').value;
            const months = document.getElementById('dmMonths').value;

            // 优先用月龄推算日期
            if (!date && months !== '' && birthDate) {
                date = monthsToDate(months, birthDate);
            }

            if (!date) { showToast('请选择日期或输入月龄'); return; }

            const { title, category } = pendingMilestone;
            const data = { title, category, milestone_date: date, description: '' };
            if (birthDate) {
                const m = dateToMonths(date, birthDate);
                if (m !== null) data.age_months = Math.round(m * 10) / 10;
            }

            closeDateModal();
            addMilestoneAPI(data).then(ok => { if (ok) renderPredef(); });
        }

        // ── 日期 ↔ 月龄 同步 ──
        function syncDateToMonths() {
            const dateVal = document.getElementById('dmDate').value;
            const monthsInput = document.getElementById('dmMonths');
            const ageEl = document.getElementById('dmAge');
            if (birthDate && dateVal) {
                const m = dateToMonths(dateVal, birthDate);
                if (m !== null && m >= 0) {
                    monthsInput.value = m.toFixed(1);
                    ageEl.textContent = `当时约 ${m.toFixed(1)} 个月`;
                    return;
                }
            }
            if (!document.getElementById('dmMonths').value) ageEl.textContent = '';
        }

        function syncMonthsToDate() {
            const monthsVal = document.getElementById('dmMonths').value;
            const dateInput = document.getElementById('dmDate');
            const ageEl = document.getElementById('dmAge');
            if (birthDate && monthsVal !== '' && monthsVal >= 0) {
                const d = monthsToDate(monthsVal, birthDate);
                if (d) {
                    dateInput.value = d;
                    ageEl.textContent = `≈ ${parseFloat(monthsVal).toFixed(1)} 个月 (${d})`;
                    return;
                }
            }
            if (!dateInput.value) ageEl.textContent = '';
        }

        document.getElementById('dmDate')?.addEventListener('change', syncDateToMonths);
        document.getElementById('dmMonths')?.addEventListener('input', syncMonthsToDate);

        async function addCustomMilestone() {
            const title = document.getElementById('fTitle').value.trim();
            const date = document.getElementById('fDate').value;
            const cat = document.getElementById('fCategory').value;
            const desc = document.getElementById('fDesc').value.trim();

            if (!title) { showToast('请输入里程碑名称'); return; }
            if (!date) { showToast('请选择日期'); return; }

            const data = { title, category: cat, milestone_date: date, description: desc };
            if (birthDate) {
                const m = dateToMonths(date, birthDate);
                if (m !== null) data.age_months = Math.round(m * 10) / 10;
            }

            const ok = await addMilestoneAPI(data);
            if (ok) {
                document.getElementById('fTitle').value = '';
                document.getElementById('fDesc').value = '';
                document.getElementById('fDate').value = '';
            }
        }

        // ── Birth date ──
        function showBirthSetup() {
            const el = document.getElementById('birthSetup');
            el.classList.toggle('show');
            if (birthDate) document.getElementById('birthDateInput').value = birthDate;
        }

        function saveBirthDate() {
            const val = document.getElementById('birthDateInput').value;
            if (!val) { showToast('请选择日期'); return; }
            birthDate = val;
            localStorage.setItem('milestoneBirthDate', val);
            document.getElementById('birthBadge').innerHTML = `📅 出生 ${val}`;
            document.getElementById('birthSetup').classList.remove('show');
            showToast('出生日期已保存');
            renderAll();
        }

        // ── Toast ──
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
